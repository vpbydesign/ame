name: Audit Regression

# Runs the full audit regression suite on every pull request and on pushes
# to main. Audit regression tests encode every known historical defect of
# AME's reference implementations and the expected post-fix behavior.
#
# A test that was previously passing but now fails is a merge blocker.
#
# See specification/v1.0/regression-protocol.md for the discipline rules
# that govern this workflow.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kotlin-tests:
    name: Kotlin (ame-core + ame-compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: ame-core full test suite
        run: ./gradlew :ame-core:test

      - name: ame-core audit regression suite (subset for fast feedback)
        run: ./gradlew :ame-core:test --tests AuditedBugRegressionTest --rerun-tasks

      - name: ame-compose audit regression suite
        run: ./gradlew :ame-compose:testDebugUnitTest

      - name: Upload Kotlin test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-test-reports
          path: |
            ame-core/build/reports/tests/
            ame-compose/build/reports/tests/

  swift-tests:
    name: Swift (ame-swiftui)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve packages
        run: cd ame-swiftui && swift package resolve

      - name: Swift full test suite
        run: cd ame-swiftui && swift test

      - name: Swift audit regression suites
        run: |
          cd ame-swiftui
          swift test --filter AuditedBugRegressionTests
          swift test --filter AuditedSwiftUIBugTests

  flutter-tests:
    name: Flutter (ame-flutter + ame-flutter-ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Resolve Flutter packages
        run: |
          cd ame-flutter && dart pub get
          cd ../ame-flutter-ui && flutter pub get

      - name: ame-flutter full test suite
        run: cd ame-flutter && dart test

      - name: ame-flutter audit regression suite
        run: cd ame-flutter && dart test test/audited_bug_regression_test.dart

      - name: ame-flutter-ui full test suite
        run: cd ame-flutter-ui && flutter test

      - name: ame-flutter-ui audit regression suites
        run: |
          cd ame-flutter-ui
          flutter test test/audited_ui_bug_regression_test.dart
          flutter test test/audited_chart_math_test.dart
          flutter test test/audited_form_state_test.dart

      - name: Upload Flutter test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-reports
          path: |
            ame-flutter/test_reports/
            ame-flutter-ui/test_reports/

  conformance-parity:
    name: Conformance suite parity
    needs: [kotlin-tests, swift-tests, flutter-tests]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Resolve Flutter dependencies
        run: cd ame-flutter && dart pub get

      - name: Build Kotlin reference CLI
        run: ./gradlew :ame-core:installDist

      - name: Run conformance parity script
        run: ./conformance/check-parity.sh

  audit-summary:
    name: Audit verdict summary
    needs: [kotlin-tests, swift-tests, flutter-tests, conformance-parity]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify AUDIT_VERDICTS.md is up to date
        run: |
          if [ ! -f AUDIT_VERDICTS.md ]; then
            echo "AUDIT_VERDICTS.md is missing"
            exit 1
          fi
          # Ensure the verdict report mentions every audit-regression test class.
          grep -q "AuditedBugRegressionTest" AUDIT_VERDICTS.md || {
            echo "AUDIT_VERDICTS.md does not reference the regression test classes"
            exit 1
          }
          echo "AUDIT_VERDICTS.md present and references regression suites."
